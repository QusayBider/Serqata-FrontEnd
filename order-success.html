<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Molla - Order Success</title>
    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/images/icons/favicon-16x16.png">
    <link rel="manifest" href="assets/images/icons/site.html">
    <link rel="mask-icon" href="assets/images/icons/safari-pinned-tab.svg" color="#666666">
    <link rel="shortcut icon" href="assets/images/icons/favicon.ico">
    <meta name="theme-color" content="#ffffff">
    <!-- Plugins CSS File -->
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <!-- Main CSS File -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .success-content {
            padding: 100px 0;
            background-color: #f9f9f9;
        }

        .success-card {
            background: #fff;
            padding: 50px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            max-width: 600px;
            margin: 0 auto;
        }

        .success-icon {
            font-size: 80px;
            color: #28a745;
            margin-bottom: 20px;
        }

        .success-title {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .success-message {
            font-size: 18px;
            color: #777;
            margin-bottom: 30px;
        }

        .order-id-display {
            font-weight: 600;
            color: #333;
            background: #f1f1f1;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .tracking-number-display {
            font-weight: 600;
            color: #c96;
            background: #fff3e0;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid #ffe0b2;
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <header class="header">
            <!-- Header content will be filled by common JS or loaded from main template -->
            <div class="header-middle sticky-header">
                <div class="container-fluid">
                    <div class="header-left">
                        <a href="index.html" class="logo">
                            <img src="assets/images/logo.png" alt="Serqata Logo" width="150" height="20">
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <main class="main">
            <div class="success-content text-center">
                <div class="container-fluid">
                    <div class="success-card">
                        <div class="success-icon">
                            <i class="icon-check-circle"></i>
                        </div>
                        <h1 class="success-title">Order Placed Successfully!</h1>
                        <p id="success-status-msg" class="success-message">Processing your payment confirmation...</p>
                        <div id="order-info-container" style="display: none;">
                            <div class="mb-2">
                                <span class="order-id-display">Order ID: <span id="display-order-id"></span></span>
                            </div>
                            <div id="tracking-container">
                                <span class="tracking-number-display">Tracking Number: <span
                                        id="display-tracking-number"></span></span>
                            </div>
                        </div>
                        <p>Thank you for shopping with us. We've received your order and are getting it ready.</p>
                        <a href="index.html" class="btn btn-outline-primary-2 btn-minwidth-lg mt-3">
                            <span>BACK TO HOMEPAGE</span>
                            <i class="icon-long-arrow-right"></i>
                        </a>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="footer-bottom">
                <div class="container-fluid text-center">
                    <p class=\"footer-copyright\">Copyright © 2024 Serqata. All Rights Reserved.</p>
                </div>
            </div>
        </footer>
    </div>

    <!-- Plugins JS File -->
    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <!-- Main JS File -->
    <script src="assets/js/config.js"></script>
    <script src="assets/js/cart.js"></script>
    <script src="assets/js/order-success.js"></script>
</body>

</html>
