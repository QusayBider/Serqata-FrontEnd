<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serqata – Sign In / Register</title>
  <link rel="stylesheet" href="assets/css/login_style.css">
</head>
<body>

  <div class="scene">
    <!-- Animated background orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="wrapper" id="wrapper">

    <!-- ─── SIGN IN PANEL ─── -->
    <div class="panel panel-login active" id="panel-login">
      <div class="brand">
        <span class="brand-icon">◈</span>
        <span class="brand-name">Serqata</span>
      </div>
      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to continue shopping</p>

      <div id="login-message" class="message-box" style="display:none;"></div>

      <form id="login-form" novalidate>

        <div class="input-field">
          <input type="email" id="singin-email-2" name="email" required autocomplete="email">
          <label for="singin-email-2">Email address</label>
          <span class="input-bar"></span>
        </div>

        <div class="input-field">
          <input type="password" id="singin-password-2" name="password" required autocomplete="current-password">
          <label for="singin-password-2">Password</label>
          <span class="input-bar"></span>
          <button type="button" class="eye-btn" id="toggle-password" aria-label="Toggle password visibility">
            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>

        <div class="extras">
          <label class="remember">
            <input type="checkbox" id="signin-remember-2">
            <span class="checkmark"></span>
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link" id="open-forgot">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary" id="login-btn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader" style="display:none;">●●●</span>
        </button>

      </form>

      <div class="divider"><span>or continue with</span></div>

      <div class="social-row">
        <button class="btn-social btn-google" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#EA4335" d="M5.27 9.77A7.2 7.2 0 0 1 12 4.8c1.7 0 3.24.6 4.44 1.6L19.6 3.2A11.94 11.94 0 0 0 12 0C7.27 0 3.2 2.7 1.22 6.63l4.05 3.14Z"/><path fill="#34A853" d="M16.04 19.56A7.18 7.18 0 0 1 12 20.8c-2.93 0-5.45-1.76-6.67-4.32l-4.06 3.13C3.25 23.3 7.3 26 12 26c3.26 0 6.24-1.17 8.53-3.1l-4.49-3.34Z"/><path fill="#4A90D9" d="M23.76 12.27c0-.9-.07-1.56-.22-2.27H12v4.1h6.6a5.86 5.86 0 0 1-2.56 3.73l4.5 3.34C22.96 18.94 23.76 15.84 23.76 12.27Z"/><path fill="#FBBC05" d="M5.33 16.48A7.28 7.28 0 0 1 4.8 12c0-1.56.43-3.02 1.18-4.27L1.93 4.59A11.95 11.95 0 0 0 .8 12c0 1.93.46 3.75 1.27 5.37l3.26-2.89Z"/></svg>
          Google
        </button>
        <button class="btn-social btn-facebook" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.07C24 5.41 18.63 0 12 0S0 5.41 0 12.07C0 18.1 4.39 23.1 10.13 24v-8.44H7.08v-3.49h3.04V9.41c0-3.02 1.8-4.7 4.54-4.7 1.31 0 2.68.24 2.68.24v2.97h-1.51c-1.49 0-1.95.93-1.95 1.88v2.27h3.32l-.53 3.49h-2.79V24C19.61 23.1 24 18.1 24 12.07Z"/></svg>
          Facebook
        </button>
      </div>

      <p class="switch-text">Don't have an account? <a href="#" id="go-register">Create one</a></p>
    </div>

    <!-- ─── REGISTER PANEL ─── -->
    <div class="panel panel-register" id="panel-register">
      <div class="brand">
        <span class="brand-icon">◈</span>
        <span class="brand-name">Molla</span>
      </div>
      <h2>Create account</h2>
      <p class="subtitle">Join us and start shopping</p>

      <div id="register-message" class="message-box" style="display:none;"></div>
      <div id="register-error" class="message-box error" style="display:none;"></div>

      <form id="register-form" novalidate>

        <div class="input-row">
          <div class="input-field">
            <input type="text" id="register-fullname-2" name="fullName" required>
            <label for="register-fullname-2">Full name</label>
            <span class="input-bar"></span>
          </div>
          <div class="input-field">
            <input type="text" id="register-username-2" name="userName" required>
            <label for="register-username-2">Username</label>
            <span class="input-bar"></span>
          </div>
        </div>

        <div class="input-field">
          <input type="email" id="register-email-2" name="email" required autocomplete="email">
          <label for="register-email-2">Email address</label>
          <span class="input-bar"></span>
        </div>

        <div class="input-field">
          <input type="tel" id="register-phone-2" name="phone" required>
          <label for="register-phone-2">Phone number</label>
          <span class="input-bar"></span>
        </div>

        <div class="input-field">
          <input type="password" id="register-password-2" name="password" required>
          <label for="register-password-2">Password</label>
          <span class="input-bar"></span>
        </div>

        <label class="policy-check">
          <input type="checkbox" id="register-policy-2" required>
          <span class="checkmark"></span>
          <span>I agree to the <a href="#">privacy policy</a></span>
        </label>

        <button type="submit" class="btn-primary" id="register-btn">
          <span class="btn-text">Create Account</span>
          <span class="btn-loader" style="display:none;">●●●</span>
        </button>

      </form>

      <div class="divider"><span>or sign up with</span></div>

      <div class="social-row">
        <button class="btn-social btn-google" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#EA4335" d="M5.27 9.77A7.2 7.2 0 0 1 12 4.8c1.7 0 3.24.6 4.44 1.6L19.6 3.2A11.94 11.94 0 0 0 12 0C7.27 0 3.2 2.7 1.22 6.63l4.05 3.14Z"/><path fill="#34A853" d="M16.04 19.56A7.18 7.18 0 0 1 12 20.8c-2.93 0-5.45-1.76-6.67-4.32l-4.06 3.13C3.25 23.3 7.3 26 12 26c3.26 0 6.24-1.17 8.53-3.1l-4.49-3.34Z"/><path fill="#4A90D9" d="M23.76 12.27c0-.9-.07-1.56-.22-2.27H12v4.1h6.6a5.86 5.86 0 0 1-2.56 3.73l4.5 3.34C22.96 18.94 23.76 15.84 23.76 12.27Z"/><path fill="#FBBC05" d="M5.33 16.48A7.28 7.28 0 0 1 4.8 12c0-1.56.43-3.02 1.18-4.27L1.93 4.59A11.95 11.95 0 0 0 .8 12c0 1.93.46 3.75 1.27 5.37l3.26-2.89Z"/></svg>
          Google
        </button>
        <button class="btn-social btn-facebook" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.07C24 5.41 18.63 0 12 0S0 5.41 0 12.07C0 18.1 4.39 23.1 10.13 24v-8.44H7.08v-3.49h3.04V9.41c0-3.02 1.8-4.7 4.54-4.7 1.31 0 2.68.24 2.68.24v2.97h-1.51c-1.49 0-1.95.93-1.95 1.88v2.27h3.32l-.53 3.49h-2.79V24C19.61 23.1 24 18.1 24 12.07Z"/></svg>
          Facebook
        </button>
      </div>

      <p class="switch-text">Already have an account? <a href="#" id="go-login">Sign in</a></p>
    </div>

    <!-- ─── FORGOT PASSWORD PANEL ─── -->
    <div class="panel panel-forgot" id="panel-forgot">
      <button type="button" class="back-btn" id="back-to-login">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </button>
      <div class="brand">
        <span class="brand-icon">◈</span>
        <span class="brand-name">Molla</span>
      </div>
      <h2>Reset password</h2>
      <p class="subtitle">We'll send a reset code to your email</p>

      <div id="forgot-message" class="message-box" style="display:none;"></div>
      <div id="forgot-error" class="message-box error" style="display:none;"></div>

      <form id="forgot-form" novalidate>
        <div class="input-field">
          <input type="email" id="forget-password-email" name="email" required>
          <label for="forget-password-email">Email address</label>
          <span class="input-bar"></span>
        </div>
        <button type="submit" class="btn-primary">
          <span class="btn-text">Send Reset Code</span>
          <span class="btn-loader" style="display:none;">●●●</span>
        </button>
      </form>
    </div>

  </div><!-- /.wrapper -->

  <!-- Config & Auth scripts — ORDER MATTERS -->
  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/login_auth.js"></script>
</body>
</html>
